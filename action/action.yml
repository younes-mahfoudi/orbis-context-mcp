name: 'Generate LLM.txt'
description: 'Generate an LLM context documentation file (llm.txt) for a repository using gitingest'
author: 'Dedalus CIS4U'

inputs:
  github-token:
    description: 'GitHub token for pushing commits (defaults to the automatic GITHUB_TOKEN)'
    required: false
    default: ${{ github.token }}
  output-path:
    description: 'Output file path relative to repo root'
    required: false
    default: 'docs/llm.txt'
  include-patterns:
    description: 'File glob patterns to include (comma-separated, e.g. "*.py,*.ts")'
    required: false
    default: ''
  exclude-patterns:
    description: 'File glob patterns to exclude (comma-separated, e.g. "tests/*,docs/*")'
    required: false
    default: ''
  commit-changes:
    description: 'Whether to auto-commit the generated file'
    required: false
    default: 'true'

outputs:
  llm-txt-path:
    description: 'Path to the generated llm.txt file'
    value: ${{ steps.generate.outputs.llm-txt-path }}

runs:
  using: 'composite'
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install gitingest
      shell: bash
      run: pip install gitingest

    - name: Generate LLM.txt
      id: generate
      shell: bash
      env:
        OUTPUT_PATH: ${{ inputs.output-path }}
        INCLUDE_PATTERNS: ${{ inputs.include-patterns }}
        EXCLUDE_PATTERNS: ${{ inputs.exclude-patterns }}
      run: |
        ARGS=(. --output "$OUTPUT_PATH")

        if [[ -n "$INCLUDE_PATTERNS" ]]; then
          IFS=',' read -ra PATTERNS <<< "$INCLUDE_PATTERNS"
          for pattern in "${PATTERNS[@]}"; do
            ARGS+=(--include-pattern "$(echo "$pattern" | xargs)")
          done
        fi

        if [[ -n "$EXCLUDE_PATTERNS" ]]; then
          IFS=',' read -ra PATTERNS <<< "$EXCLUDE_PATTERNS"
          for pattern in "${PATTERNS[@]}"; do
            ARGS+=(--exclude-pattern "$(echo "$pattern" | xargs)")
          done
        fi

        mkdir -p "$(dirname "$OUTPUT_PATH")"
        gitingest "${ARGS[@]}"
        echo "llm-txt-path=$OUTPUT_PATH" >> "$GITHUB_OUTPUT"
        echo "Generated llm.txt at $OUTPUT_PATH ($(wc -c < "$OUTPUT_PATH") bytes)"

    - name: Commit changes
      if: ${{ inputs.commit-changes == 'true' }}
      shell: bash
      env:
        OUTPUT_PATH: ${{ inputs.output-path }}
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add "$OUTPUT_PATH"
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "docs: update llm.txt [skip ci]"
          git push
        fi
